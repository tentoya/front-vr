<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>VR Gallery</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; }
    #hint {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 100; pointer-events: none;
    }
    .chip {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); color: #fff;
      padding: 7px 16px; border-radius: 999px;
      font-family: sans-serif; font-size: 13px;
    }
  </style>
</head>
<body>

<div id="hint">
  <span class="chip">WASDで移動</span>
  <span class="chip">マウスで視点変更</span>
  <span class="chip">VRゴーグル対応</span>
</div>

<a-scene
  background="color: #060610"
  fog="type: exponential; color: #060610; density: 0.025"
  vr-mode-ui="enabled: true"
>

  <!-- ========== カメラ（入口前） ========== -->
  <a-entity position="0 0 9">
    <a-camera look-controls wasd-controls="acceleration: 30">
      <a-cursor color="#ffffff" opacity="0.6"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ========== 環境光 ========== -->
  <a-light type="ambient" color="#080820" intensity="1"></a-light>

  <!-- ========== 床（全体） ========== -->
  <a-box position="0 -0.05 -12" width="8" depth="42" height="0.1"
    material="color: #0c0c1c; roughness: 0.2; metalness: 0.6"></a-box>

  <!-- 床グリッド -->
  <a-entity position="0 0.01 -12" geometry="primitive: plane; width: 8; height: 42; segmentsWidth: 16; segmentsHeight: 84"
    rotation="-90 0 0"
    material="color: #3344ff; opacity: 0.06; transparent: true; wireframe: true">
  </a-entity>

  <!-- ========== 入口ポータル（z=4） ========== -->
  <!-- 左ピラー -->
  <a-box position="-3 1.75 4" width="0.4" depth="0.4" height="3.5"
    material="color: #1a1a3a; roughness: 0.4; metalness: 0.8"></a-box>
  <!-- 右ピラー -->
  <a-box position="3 1.75 4" width="0.4" depth="0.4" height="3.5"
    material="color: #1a1a3a; roughness: 0.4; metalness: 0.8"></a-box>
  <!-- 上梁 -->
  <a-box position="0 3.6 4" width="6.4" depth="0.4" height="0.3"
    material="color: #1a1a3a; roughness: 0.4; metalness: 0.8"></a-box>
  <!-- ピラー発光ライン -->
  <a-box position="-2.79 1.75 3.82" width="0.04" depth="0.04" height="3"
    material="color: #99aaff; emissive: #5566ff; emissiveIntensity: 1"></a-box>
  <a-box position="2.79 1.75 3.82" width="0.04" depth="0.04" height="3"
    material="color: #99aaff; emissive: #5566ff; emissiveIntensity: 1"></a-box>
  <a-light type="point" color="#4455ff" intensity="2" position="0 3 4" distance="6" decay="2"></a-light>
  <!-- タイトル -->
  <a-text value="GEOMETRY GALLERY" position="0 3.1 3.85"
    align="center" color="#ccccff" width="9" opacity="1"></a-text>

  <!-- ========== 入口廊下（z: 4 → -6 / 幅6） ========== -->
  <!-- 天井 -->
  <a-box position="0 3.5 -1" width="6" depth="10" height="0.1"
    material="color: #090916; roughness: 1"></a-box>
  <!-- 左壁 -->
  <a-box position="-3 1.75 -1" width="0.1" depth="10" height="3.5"
    material="color: #10102a; roughness: 0.8"></a-box>
  <!-- 右壁 -->
  <a-box position="3 1.75 -1" width="0.1" depth="10" height="3.5"
    material="color: #10102a; roughness: 0.8"></a-box>
  <!-- 廊下天井ライト -->
  <a-box position="0 3.46 -1" width="0.7" depth="7" height="0.02"
    material="color: #aaaaff; emissive: #5566ff; emissiveIntensity: 0.9"></a-box>
  <a-light type="point" color="#6677ff" intensity="2" position="0 3 -1" distance="9" decay="1.5"></a-light>

  <!-- ========== アーチ（廊下→メインホール）z=-6 ========== -->
  <a-box position="-3.5 1.75 -6" width="1" depth="0.2" height="3.6"
    material="color: #1a1a3a; metalness: 0.7"></a-box>
  <a-box position="3.5 1.75 -6" width="1" depth="0.2" height="3.6"
    material="color: #1a1a3a; metalness: 0.7"></a-box>
  <a-box position="0 3.7 -6" width="8" depth="0.2" height="0.6"
    material="color: #1a1a3a; metalness: 0.7"></a-box>

  <!-- ========== メインギャラリーホール（z: -6 → -22 / 幅8） ========== -->
  <!-- 天井 -->
  <a-box position="0 4 -14" width="8" depth="16" height="0.1"
    material="color: #090916; roughness: 1"></a-box>
  <!-- 左壁 -->
  <a-box position="-4 2 -14" width="0.1" depth="16" height="4"
    material="color: #0f0f28; roughness: 0.8"></a-box>
  <!-- 右壁 -->
  <a-box position="4 2 -14" width="0.1" depth="16" height="4"
    material="color: #0f0f28; roughness: 0.8"></a-box>
  <!-- 幅木（左・右） -->
  <a-box position="-3.96 0.1 -14" width="0.06" depth="16" height="0.2"
    material="color: #2a2a5a; metalness: 0.7"></a-box>
  <a-box position="3.96 0.1 -14" width="0.06" depth="16" height="0.2"
    material="color: #2a2a5a; metalness: 0.7"></a-box>
  <!-- 天井モールディング（左・右） -->
  <a-box position="-3.96 3.9 -14" width="0.06" depth="16" height="0.15"
    material="color: #2a2a5a; metalness: 0.7"></a-box>
  <a-box position="3.96 3.9 -14" width="0.06" depth="16" height="0.15"
    material="color: #2a2a5a; metalness: 0.7"></a-box>

  <!-- 天井ライン × 3 -->
  <a-box position="0 3.96 -9" width="0.8" depth="4" height="0.02"
    material="color: #aaaaff; emissive: #5566ff; emissiveIntensity: 0.9"></a-box>
  <a-light type="point" color="#7788ff" intensity="3" position="0 3.5 -9" distance="10" decay="1.5"></a-light>

  <a-box position="0 3.96 -14" width="0.8" depth="4" height="0.02"
    material="color: #aaaaff; emissive: #5566ff; emissiveIntensity: 0.9"></a-box>
  <a-light type="point" color="#7788ff" intensity="3" position="0 3.5 -14" distance="10" decay="1.5"></a-light>

  <a-box position="0 3.96 -19" width="0.8" depth="4" height="0.02"
    material="color: #aaaaff; emissive: #5566ff; emissiveIntensity: 0.9"></a-box>
  <a-light type="point" color="#7788ff" intensity="3" position="0 3.5 -19" distance="10" decay="1.5"></a-light>

  <!-- ========== 左壁 アートワーク ========== -->

  <!-- No.1 Azure Dreams (z=-9) -->
  <a-entity position="-3.93 2 -9">
    <a-box width="0.06" depth="2.5" height="1.9"
      material="color: #1e1e44; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box width="0.04" depth="2.1" height="1.5" position="0.01 0 0"
      material="color: #00114a; emissive: #000a2e; roughness: 0.1; metalness: 0.3"></a-box>
    <a-sphere position="0.03 0.1 0" radius="0.35"
      material="color: #4488ff; emissive: #1133cc; opacity: 0.55; transparent: true"
      animation="property: scale; to: 1.6 1.6 1.6; dir: alternate; loop: true; dur: 2600; easing: easeInOutSine">
    </a-sphere>
    <a-light type="point" color="#3366ff" intensity="4" position="1.5 1.5 0" distance="4" decay="2"></a-light>
    <a-text rotation="0 90 0" value="No.1  AZURE DREAMS" position="0.08 -1.15 0"
      color="#6699ff" width="4" align="center" opacity="0.9"></a-text>
  </a-entity>

  <!-- No.2 Crimson Reverie (z=-14) -->
  <a-entity position="-3.93 2 -14">
    <a-box width="0.06" depth="2.5" height="1.9"
      material="color: #44162e; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box width="0.04" depth="2.1" height="1.5" position="0.01 0 0"
      material="color: #550020; emissive: #330010; roughness: 0.1; metalness: 0.3"></a-box>
    <a-torus position="0.03 0 0" radius="0.4" radius-tubular="0.06"
      material="color: #ff44aa; emissive: #cc1166; opacity: 0.7; transparent: true"
      animation="property: rotation; to: 0 0 360; loop: true; dur: 3000; easing: linear">
    </a-torus>
    <a-light type="point" color="#ff3399" intensity="4" position="1.5 1.5 0" distance="4" decay="2"></a-light>
    <a-text rotation="0 90 0" value="No.2  CRIMSON REVERIE" position="0.08 -1.15 0"
      color="#ff66bb" width="4" align="center" opacity="0.9"></a-text>
  </a-entity>

  <!-- No.3 Ocean Depth (z=-19) -->
  <a-entity position="-3.93 2 -19">
    <a-box width="0.06" depth="2.5" height="1.9"
      material="color: #14363a; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box width="0.04" depth="2.1" height="1.5" position="0.01 0 0"
      material="color: #004444; emissive: #002222; roughness: 0.1; metalness: 0.3"></a-box>
    <a-octahedron position="0.03 0 0" radius="0.4"
      material="color: #44ffcc; emissive: #22aa88; opacity: 0.65; transparent: true"
      animation="property: rotation; to: 360 360 0; loop: true; dur: 4000; easing: linear">
    </a-octahedron>
    <a-light type="point" color="#33ffcc" intensity="4" position="1.5 1.5 0" distance="4" decay="2"></a-light>
    <a-text rotation="0 90 0" value="No.3  OCEAN DEPTH" position="0.08 -1.15 0"
      color="#55ffdd" width="4" align="center" opacity="0.9"></a-text>
  </a-entity>

  <!-- ========== 右壁 アートワーク ========== -->

  <!-- No.4 Golden Hour (z=-9) -->
  <a-entity position="3.93 2 -9">
    <a-box width="0.06" depth="2.5" height="1.9"
      material="color: #3e2a08; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box width="0.04" depth="2.1" height="1.5" position="-0.01 0 0"
      material="color: #553300; emissive: #332200; roughness: 0.1; metalness: 0.5"></a-box>
    <a-cone position="-0.03 -0.1 0" radius-bottom="0.35" height="0.7"
      material="color: #ffcc33; emissive: #cc8800; opacity: 0.7; transparent: true"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
    </a-cone>
    <a-light type="point" color="#ffbb33" intensity="4" position="-1.5 1.5 0" distance="4" decay="2"></a-light>
    <a-text rotation="0 -90 0" value="No.4  GOLDEN HOUR" position="-0.08 -1.15 0"
      color="#ffdd55" width="4" align="center" opacity="0.9"></a-text>
  </a-entity>

  <!-- No.5 Violet Dusk (z=-14) -->
  <a-entity position="3.93 2 -14">
    <a-box width="0.06" depth="2.5" height="1.9"
      material="color: #2a0a40; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box width="0.04" depth="2.1" height="1.5" position="-0.01 0 0"
      material="color: #330055; emissive: #1a0033; roughness: 0.1; metalness: 0.3"></a-box>
    <a-icosahedron position="-0.03 0 0" radius="0.38"
      material="color: #cc44ff; emissive: #8811cc; opacity: 0.65; transparent: true"
      animation="property: rotation; to: 360 0 360; loop: true; dur: 6000; easing: linear">
    </a-icosahedron>
    <a-light type="point" color="#bb33ff" intensity="4" position="-1.5 1.5 0" distance="4" decay="2"></a-light>
    <a-text rotation="0 -90 0" value="No.5  VIOLET DUSK" position="-0.08 -1.15 0"
      color="#dd66ff" width="4" align="center" opacity="0.9"></a-text>
  </a-entity>

  <!-- No.6 Forest Echo (z=-19) -->
  <a-entity position="3.93 2 -19">
    <a-box width="0.06" depth="2.5" height="1.9"
      material="color: #143020; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box width="0.04" depth="2.1" height="1.5" position="-0.01 0 0"
      material="color: #003322; emissive: #001a11; roughness: 0.1; metalness: 0.3"></a-box>
    <a-dodecahedron position="-0.03 0 0" radius="0.38"
      material="color: #44ff88; emissive: #22cc66; opacity: 0.6; transparent: true"
      animation="property: rotation; to: -360 360 0; loop: true; dur: 7000; easing: linear">
    </a-dodecahedron>
    <a-light type="point" color="#33ff77" intensity="4" position="-1.5 1.5 0" distance="4" decay="2"></a-light>
    <a-text rotation="0 -90 0" value="No.6  FOREST ECHO" position="-0.08 -1.15 0"
      color="#66ffaa" width="4" align="center" opacity="0.9"></a-text>
  </a-entity>

  <!-- ========== アーチ（メインホール→エンドルーム）z=-22 ========== -->
  <!-- 左ブロック（x: -7 to -3） -->
  <a-box position="-5 2.5 -22" width="4" depth="0.2" height="5"
    material="color: #1a1a3a; metalness: 0.7"></a-box>
  <!-- 右ブロック（x: 3 to 7） -->
  <a-box position="5 2.5 -22" width="4" depth="0.2" height="5"
    material="color: #1a1a3a; metalness: 0.7"></a-box>
  <!-- 上梁（開口部上） -->
  <a-box position="0 4.5 -22" width="6" depth="0.2" height="1"
    material="color: #1a1a3a; metalness: 0.7"></a-box>
  <!-- アーチ装飾ライン -->
  <a-box position="-2.98 2.5 -21.9" width="0.05" depth="0.05" height="4"
    material="color: #ffcc88; emissive: #ffaa33; emissiveIntensity: 1"></a-box>
  <a-box position="2.98 2.5 -21.9" width="0.05" depth="0.05" height="4"
    material="color: #ffcc88; emissive: #ffaa33; emissiveIntensity: 1"></a-box>
  <a-light type="point" color="#ffaa44" intensity="2" position="0 4 -22" distance="5" decay="2"></a-light>

  <!-- ========== エンドルーム（z: -22 → -34 / 幅14） ========== -->
  <!-- 天井（高め: y=5.5） -->
  <a-box position="0 5.5 -28" width="14" depth="12" height="0.1"
    material="color: #07071a; roughness: 1"></a-box>
  <!-- 左壁 -->
  <a-box position="-7 2.75 -28" width="0.1" depth="12" height="5.5"
    material="color: #0d0d22; roughness: 0.7"></a-box>
  <!-- 右壁 -->
  <a-box position="7 2.75 -28" width="0.1" depth="12" height="5.5"
    material="color: #0d0d22; roughness: 0.7"></a-box>
  <!-- 奥壁 -->
  <a-box position="0 2.75 -34" width="14" depth="0.1" height="5.5"
    material="color: #0d0d22; roughness: 0.7"></a-box>
  <!-- 側壁床 -->
  <a-box position="0 -0.05 -28" width="14" depth="12" height="0.1"
    material="color: #0c0c1c; roughness: 0.15; metalness: 0.7"></a-box>

  <!-- エンドルーム照明 -->
  <a-light type="point" color="#ffffff" intensity="5" position="0 5 -28" distance="20" decay="1"></a-light>
  <a-light type="point" color="#8844ff" intensity="2.5" position="-5 4 -26" distance="10" decay="2"></a-light>
  <a-light type="point" color="#ff6633" intensity="2.5" position="5 4 -26" distance="10" decay="2"></a-light>
  <a-light type="point" color="#44aaff" intensity="2" position="0 4 -33" distance="10" decay="2"></a-light>

  <!-- 天井リング -->
  <a-torus position="0 5.4 -28" radius="3.5" radius-tubular="0.05"
    material="color: #ffffff; emissive: #aaaaff; emissiveIntensity: 0.6"
    rotation="90 0 0"
    animation="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 20000; easing: linear">
  </a-torus>

  <!-- ===== センターピース: PRIMA STELLA ===== -->
  <!-- 台座 -->
  <a-cylinder position="0 0.9 -29" radius="0.9" height="1.8"
    material="color: #16163a; roughness: 0.2; metalness: 0.9"></a-cylinder>
  <a-cylinder position="0 1.85 -29" radius="1.1" height="0.1"
    material="color: #2a2a5a; roughness: 0.1; metalness: 1"></a-cylinder>
  <!-- 外側: 回転ドデカヘドロン -->
  <a-entity position="0 3.6 -29"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
    <a-dodecahedron radius="1.4"
      material="color: #ffffff; roughness: 0; metalness: 1; emissive: #221133; opacity: 0.85; transparent: true">
    </a-dodecahedron>
  </a-entity>
  <!-- 内側: 逆回転オクタヘドロン -->
  <a-entity position="0 3.6 -29"
    animation="property: rotation; to: -360 180 360; loop: true; dur: 8000; easing: linear">
    <a-octahedron radius="0.65"
      material="color: #99aaff; roughness: 0; metalness: 1; emissive: #334499">
    </a-octahedron>
  </a-entity>
  <!-- タイトル -->
  <a-text value="PRIMA STELLA" position="0 1.78 -27.5"
    align="center" color="#ffffff" width="6" opacity="1"></a-text>

  <!-- ===== サイド彫刻（左） ===== -->
  <a-cylinder position="-5 0.75 -27" radius="0.5" height="1.5"
    material="color: #16162e; roughness: 0.3; metalness: 0.8"></a-cylinder>
  <a-entity position="-5 2.1 -27"
    animation="property: rotation; to: 360 0 720; loop: true; dur: 9000; easing: linear">
    <a-torus radius="0.75" radius-tubular="0.13"
      material="color: #ff6644; roughness: 0.05; metalness: 0.95; emissive: #441100">
    </a-torus>
  </a-entity>
  <a-text value="EMBER" position="-5 1.0 -26.2"
    align="center" color="#ff8866" width="3.5" opacity="0.9"></a-text>

  <!-- ===== サイド彫刻（右） ===== -->
  <a-cylinder position="5 0.75 -27" radius="0.5" height="1.5"
    material="color: #16162e; roughness: 0.3; metalness: 0.8"></a-cylinder>
  <a-entity position="5 2.1 -27"
    animation="property: rotation; to: -360 360 0; loop: true; dur: 11000; easing: linear">
    <a-icosahedron radius="0.75"
      material="color: #44aaff; roughness: 0.05; metalness: 0.95; emissive: #001144">
    </a-icosahedron>
  </a-entity>
  <a-text value="GLACIER" position="5 1.0 -26.2"
    align="center" color="#66bbff" width="3.5" opacity="0.9"></a-text>

</a-scene>
</body>
</html>
