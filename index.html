<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Gallery</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    #ui-overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 12px;
      pointer-events: none;
    }
    .ui-chip {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 18px;
      border-radius: 999px;
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div id="ui-overlay">
  <span class="ui-chip">マウスドラッグで視点移動</span>
  <span class="ui-chip">VRゴーグルでも体験可</span>
</div>

<a-scene
  background="color: #0a0a12"
  fog="type: exponential; color: #0a0a12; density: 0.025"
  vr-mode-ui="enabled: true"
>

  <!-- アセット -->
  <a-assets>
    <a-mixin id="float-anim"
      animation="property: position; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true; to: 0 0.3 0"
    ></a-mixin>
  </a-assets>

  <!-- カメラ + カーソル -->
  <a-entity id="rig" position="0 1.6 8">
    <a-camera look-controls="reverseMouseDrag: false" wasd-controls="enabled: true">
      <a-cursor
        color="#ffffff"
        opacity="0.6"
        fuse="true"
        fuse-timeout="1500"
        animation__mouseenter="property: scale; startEvents: mouseenter; easing: easeInCubic; dur: 300; to: 2 2 2"
        animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 300; to: 1 1 1"
      ></a-cursor>
    </a-camera>
  </a-entity>

  <!-- 床 -->
  <a-plane
    position="0 0 0"
    rotation="-90 0 0"
    width="40" height="40"
    material="color: #111122; roughness: 0.8; metalness: 0.2"
    shadow="receive: true"
  ></a-plane>

  <!-- グリッドライン（床） -->
  <a-entity position="0 0.01 0">
    <a-plane rotation="-90 0 0" width="40" height="40"
      material="color: #2233ff; opacity: 0.06; transparent: true; wireframe: true"
      geometry="primitive: plane; segmentsWidth: 20; segmentsHeight: 20"
    ></a-plane>
  </a-entity>

  <!-- 天井ライト -->
  <a-light type="ambient" color="#223" intensity="0.5"></a-light>
  <a-light type="point" color="#6699ff" intensity="2" position="0 8 0" distance="20" decay="2"></a-light>
  <a-light type="point" color="#ff44aa" intensity="1.5" position="-8 5 -5" distance="15" decay="2"></a-light>
  <a-light type="point" color="#44ffcc" intensity="1.5" position="8 5 -5" distance="15" decay="2"></a-light>

  <!-- ======= アート作品 ======= -->

  <!-- 中央: 浮遊するダイヤモンド -->
  <a-entity position="0 2.5 -3"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
  >
    <a-octahedron
      color="#88aaff"
      radius="0.8"
      material="color: #88aaff; roughness: 0.1; metalness: 0.9; emissive: #223388"
      shadow="cast: true"
    ></a-octahedron>
  </a-entity>

  <!-- 左: 青い回転キューブ -->
  <a-entity position="-5 1.8 -4"
    animation="property: rotation; to: 360 360 0; loop: true; dur: 10000; easing: linear"
  >
    <a-box
      width="1.2" height="1.2" depth="1.2"
      material="color: #4488ff; roughness: 0.2; metalness: 0.7; wireframe: false; emissive: #112244"
      shadow="cast: true"
    ></a-box>
  </a-entity>

  <!-- 右: ピンクのトーラス -->
  <a-entity position="5 2 -4"
    animation="property: rotation; to: 0 360 720; loop: true; dur: 12000; easing: linear"
  >
    <a-torus
      radius="0.7" radius-tubular="0.15"
      material="color: #ff44aa; roughness: 0.1; metalness: 0.8; emissive: #441133"
      shadow="cast: true"
    ></a-torus>
  </a-entity>

  <!-- 左奥: ミントの球 -->
  <a-entity position="-3 2.2 -8"
    animation="property: position; from: -3 2.2 -8; to: -3 2.8 -8; dir: alternate; loop: true; dur: 2500; easing: easeInOutSine"
  >
    <a-sphere
      radius="0.9"
      material="color: #44ffcc; roughness: 0.05; metalness: 0.95; emissive: #114433"
      shadow="cast: true"
    ></a-sphere>
  </a-entity>

  <!-- 右奥: 黄金の錐 -->
  <a-entity position="3 1.5 -8"
    animation="property: rotation; to: 0 -360 0; loop: true; dur: 7000; easing: linear"
  >
    <a-cone
      radius-bottom="0.8" height="1.6"
      material="color: #ffcc44; roughness: 0.15; metalness: 0.9; emissive: #443300"
      shadow="cast: true"
    ></a-cone>
  </a-entity>

  <!-- 背面: 大きな多面体 -->
  <a-entity position="0 3 -12"
    animation="property: rotation; to: 360 180 360; loop: true; dur: 20000; easing: linear"
  >
    <a-dodecahedron
      radius="1.5"
      material="color: #ffffff; roughness: 0.0; metalness: 1.0; emissive: #111133; opacity: 0.7; transparent: true"
      shadow="cast: true"
    ></a-dodecahedron>
  </a-entity>

  <!-- ======= ラベル ======= -->

  <a-text value="GEOMETRY\nGALLERY" position="0 5.5 -3"
    align="center" color="#ffffff" opacity="0.9"
    width="6" font="exo2bold"
  ></a-text>

  <a-text value="Diamond" position="0 1.2 -3"
    align="center" color="#88aaff" width="3" opacity="0.7"
  ></a-text>

  <a-text value="Cube" position="-5 0.8 -4"
    align="center" color="#4488ff" width="3" opacity="0.7"
  ></a-text>

  <a-text value="Torus" position="5 0.8 -4"
    align="center" color="#ff44aa" width="3" opacity="0.7"
  ></a-text>

  <a-text value="Sphere" position="-3 1.0 -8"
    align="center" color="#44ffcc" width="3" opacity="0.7"
  ></a-text>

  <a-text value="Pyramid" position="3 0.5 -8"
    align="center" color="#ffcc44" width="3" opacity="0.7"
  ></a-text>

  <!-- ======= 柱 ======= -->
  <a-cylinder position="-5 1 -4" radius="0.05" height="2"
    material="color: #4488ff; opacity: 0.3; transparent: true"
  ></a-cylinder>
  <a-cylinder position="5 1 -4" radius="0.05" height="2"
    material="color: #ff44aa; opacity: 0.3; transparent: true"
  ></a-cylinder>
  <a-cylinder position="-3 1.1 -8" radius="0.05" height="2.2"
    material="color: #44ffcc; opacity: 0.3; transparent: true"
  ></a-cylinder>
  <a-cylinder position="3 0.75 -8" radius="0.05" height="1.5"
    material="color: #ffcc44; opacity: 0.3; transparent: true"
  ></a-cylinder>

  <!-- ======= パーティクル風の星 ======= -->
  <a-entity id="stars">
    <!-- 手動で小さな球をばらまく -->
    <a-sphere position="10 8 -15" radius="0.05" material="color: #fff; emissive: #fff"></a-sphere>
    <a-sphere position="-12 6 -18" radius="0.04" material="color: #adf; emissive: #adf"></a-sphere>
    <a-sphere position="6 12 -20" radius="0.06" material="color: #fda; emissive: #fda"></a-sphere>
    <a-sphere position="-7 10 -16" radius="0.05" material="color: #afd; emissive: #afd"></a-sphere>
    <a-sphere position="14 4 -10" radius="0.04" material="color: #fff; emissive: #fff"></a-sphere>
    <a-sphere position="-15 7 -12" radius="0.05" material="color: #daf; emissive: #daf"></a-sphere>
    <a-sphere position="2 14 -19" radius="0.03" material="color: #fff; emissive: #fff"></a-sphere>
    <a-sphere position="-4 11 -22" radius="0.06" material="color: #fad; emissive: #fad"></a-sphere>
    <a-sphere position="9 3 -8" radius="0.04" material="color: #aff; emissive: #aff"></a-sphere>
    <a-sphere position="-10 9 -14" radius="0.05" material="color: #fff; emissive: #fff"></a-sphere>
    <a-sphere position="16 11 -17" radius="0.04" material="color: #ffa; emissive: #ffa"></a-sphere>
    <a-sphere position="-16 5 -9" radius="0.05" material="color: #aaf; emissive: #aaf"></a-sphere>
  </a-entity>

  <!-- 壁(後方) -->
  <a-plane position="0 6 -20" width="40" height="12"
    material="color: #0a0a18; roughness: 1; opacity: 0.95"
  ></a-plane>

</a-scene>

</body>
</html>
